<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Login completato...</title>
  <style>
    body {
      background: #0f0f0f;
      color: #888;
      font-family: monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <span>Login completato, puoi chiudere questa finestra...</span>
  <script>
    // Legge il token dall'URL e lo manda alla finestra parent (l'app)
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const token = params.get("access_token");
 
    if (token && window.opener) {
      window.opener.postMessage({ type: "GOOGLE_TOKEN", token }, "*");
      setTimeout(() => window.close(), 800);
    } else {
      document.querySelector("span").textContent = "Errore: token non trovato.";
    }
  </script>
</body>
</html>
