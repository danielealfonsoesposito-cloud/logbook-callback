<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Login completato...</title>
  <style>
    body { background: #0f0f0f; color: #c8f55a; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-size: 14px; }
  </style>
</head>
<body>
  <span>✓ Login completato, torna all'app...</span>
  <script>
    const full = window.location.href;
    const hashIdx = full.indexOf('#');
    const paramStr = hashIdx !== -1 ? full.substring(hashIdx + 1) : '';
    const params = new URLSearchParams(paramStr);
    const token = params.get('access_token');

    if (token) {
      // Prova postMessage verso opener
      if (window.opener) {
        try {
          window.opener.postMessage({ type: 'GOOGLE_TOKEN', token: token }, '*');
        } catch(e) {}
      }
      // Salva anche su localStorage come fallback
      localStorage.setItem('gtoken', token);
      localStorage.setItem('gtoken_ts', Date.now().toString());
      setTimeout(() => window.close(), 1500);
    } else {
      document.querySelector('span').textContent = 'Errore: token non trovato.';
    }
  </script>
</body>
</html>
