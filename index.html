  <title>Logbook</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface-high: #242424;
      --border: #2e2e2e;
      --accent: #c8f55a;
      --accent-dim: #8ab33a;
      --text: #f0f0f0;
      --muted: #888;
      --dim: #555;
      --red: #ff4d4d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Inter', sans-serif;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .app { display: flex; flex-direction: column; min-height: 100vh; padding-bottom: 80px; }

    /* LOGIN */
    .login-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh;
      padding: 40px 24px; gap: 28px;
    }
    .login-logo { font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; }
    .login-title { font-size: 32px; font-weight: 700; text-align: center; line-height: 1.2; }
    .login-title span { color: var(--accent); }
    .login-desc { font-size: 15px; color: var(--muted); text-align: center; line-height: 1.6; }
    .login-btn {
      display: flex; align-items: center; gap: 12px; justify-content: center;
      background: var(--accent); color: #0f0f0f; border: none;
      padding: 16px 28px; border-radius: 12px; font-size: 16px; font-weight: 700;
      cursor: pointer; width: 100%; -webkit-appearance: none;
    }
    .login-warn {
      font-size: 13px; color: var(--muted); text-align: center; line-height: 1.6;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px; width: 100%;
    }

    /* HEADER */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg); border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      padding-top: calc(14px + env(safe-area-inset-top));
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-title { font-family: 'Courier New', monospace; font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; }
    .header-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .logout-btn { background: none; border: 1px solid var(--border); color: var(--muted); font-size: 11px; padding: 5px 12px; border-radius: 6px; cursor: pointer; -webkit-appearance: none; }

    /* CHIPS */
    .selector-row { display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border); -webkit-overflow-scrolling: touch; }
    .selector-row::-webkit-scrollbar { display: none; }
    .week-select-row { padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .week-select {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-size: 14px; font-weight: 600;
      padding: 10px 14px; border-radius: 10px;
      -webkit-appearance: none; appearance: none;
      font-family: -apple-system, sans-serif;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%23c8f55a" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>');
      background-repeat: no-repeat;
      background-position: right 14px center;
    }
    .week-select:focus { outline: none; border-color: var(--accent); }
    .chip {
      flex-shrink: 0; background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); font-size: 12px; font-weight: 600;
      padding: 7px 16px; border-radius: 20px; cursor: pointer;
      white-space: nowrap; -webkit-appearance: none;
    }
    .chip.active { background: var(--accent); color: #0f0f0f; border-color: var(--accent); }

    /* EXERCISE CARDS */
    .ex-card { margin: 10px 16px 0; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .ex-card.expanded { border-color: var(--accent); }
    .ex-card.completed { border-color: var(--accent-dim); opacity: 0.85; }
    .progress-row { padding: 4px 16px 14px; }
    .progress-track { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; height: 8px; overflow: hidden; }
    .progress-fill { background: var(--accent); height: 100%; transition: width 0.3s ease; }
    .progress-label { font-size: 11px; color: var(--muted); margin-top: 6px; text-align: center; font-family: 'Courier New', monospace; }

  { key: "intro", title: "📖 Introduzione al mesociclo", html: `<p>MESOCICLO DI ALLENAMENTO:</p>
<p>DANIELE ESPOSITO</p>
<p>🗓️ OBIETTIVO MACROCICLO: Miglioramento della composizione corporea e dell'attività aerobica</p>
<p>🎯 OBIETTIVO DEL MESOCICLO: Adattamento anatomico e aerobico</p>
<p>NOTE IMPORTANTI:</p>
<p>❓ COS'È e COME SI USA il REP-RANGE:</p>
<p>Quando vedi riportate un numero di ripetizioni variabili, utilizza un carico che ti consenta di stare dentro al range. Per esempio in un 3 x 5_7 utilizzi un carico fisso che ti consenta di fare tutte e 3 le serie stando tra le 7 e le 5 ripetizioni. Quando arriverai a fare 7 rep nelle prime 2 serie, potrai salire con il carico. La cosa importante non è ricercare il numero esatto di ripetizioni per rimanere nel range, ma ragiungere la fatica o RIR specifico per quella settimana, anche a costo di uscire leggermente dal range.</p>
<p>❓COS'È IL RIR</p>
<p>L'acronimo RIR sta per "ripetizioni in riserva", indica il numero di ripetizioni che ci separa dall'andare a cedimento. Se ad esempio in una serie di Panca Piana con un certo carico potremmo fare 10 ripetizioni al massimo, tenere un RIR 2 in quella serie significa arrivare ad 8 rep, tenendone quindi 2 in riserva. Per ogni settimana sarà indicato uno specifico RIR da tenere negli esercizi compound e negli esercizi accessori.</p>
<p>ORGANIZZAZIONE DELLE SETTIMANE:</p>
<p>⭐️ SETTIMANA 11 *e altre</p>
<p>Lo scarico attivo serve per dissipare la fatica in vista dei Test si SETTIMANA 12. Verrà ridotto il numero di serie e si terrà un RIR2 nei compound e un RIR1 negli accessori. Oltre alla settimana 11, potrebbero essere presenti altre settimane di scarico all'interno del mesociclo.</p>
<p>⭐️ SETTIMANA 12, TEST:</p>
<p>Quando presenti, in questa settimana vengono svolti i Test negli esercizi selezionati. Tutti gli esercizi che non prevedono un test saranno tenuti a RIR 2.</p>
<p>⭐️ SETTIMANA 13, POST-TEST:</p>
<p>Quando presenti i test, la settimana 13 sarà sempre a RIR2 per i compound e RIR1 per gli accessori. Non è necessario compilare il logbook. Dalla settimana successiva inizierà il nuovo Mesociclo.</p>
<p>LEGENDA TECNICHE DI INTENSITÀ</p>
<p>👉🏻RM<br>L'acronimo RM sta per "ripetizioni massime" a sfinimento. Per esempio, un 4 x 10RM significa trovare un carico con cui arrivi a fare a sfinimento 10 ripetizioni; le successive 3 ripetizioni terrai lo stesso carico, andando a fare inevitabilmente un numero inferiore di ripetizioni (non importa quante); </p>
<p>👉🏻SUPESET: SS<br>Esegui 2 esercizi consecutivi senza pausa, recuperi solo dopo il secondo; </p>
<p>👉🏻JUMPSET: JS<br>Esegui due o più esercizi consecutivi ma a differenza del supeset hai un recupero compreso di 30’’- 1’ tra un esercizio e l'altro;</p>
<p>👉🏻DROPSET: DS<br>Arrivi a sfinimento, scali il carico e fai altre ripetizioni subito dopo senza recupero o pochissimo recupero (indicato in scheda).<br>*Variante Dropset Meccanico: facilitazione dell’esecuzione che sfrutta diverso un diverso profilo di resistenza nello stesso esercizio.</p>
<p>👉🏻SMR<br>*Variante Dropset: esegui un numero fisso di rep (da 5 a 10) a sfinimento, recuperi 20'', scali il peso e fai il doppio delle ripetizioni (da 10 a 20)</p>
<p>👉🏻REST PAUSE: RP<br>Arrivi a sfinimento, pausa 20 sec e riparti con stesso carico</p>
<p>👉🏻REP PARZIALI<br>Arrivi a sfinimento, esegui delle parziali fino a che riesci arrivare a metà ROM.</p>
<p>👉🏻MYOREPS: MYO<br>Fai 10-12 rep, recuperi 20’’ 5rep 20’’ 5rep fino a che riesci a tenerne 5, l’ultimo giro fai quelle che escono.</p>
<p>👉🏻CLUSTER: CLU<br>Una sorta di circuito a rep e recupero fissi. 5 Cluster da 6 con recupero di 30'' significa che devi fare 6 ripetizioni e recuperare 30'' per 5 giri.</p>
<p>GESTIONE PARTE AEROBICA:</p>
<p>❓COSA SONO LE ZONE DI LAVORO DI FREQUENZA CARDIACA                <br>Le zone di lavoro di frequenza cardiaca sono intervalli specifici della frequenza cardiaca massima (FCmax) che indicano il livello di intensità dell'attività svolta.                <br>                <br></p>
<p>ZONA 1: Zona di Recupero (55-65%)          <br>Zona di intensità più bassa<br>• Scopo: Favorire il recupero.              <br>ZONA 2: Zona Aerobica (65-75% di FCmax)                <br>Intensità leggera<br>• Scopo: Costruire la base aerobica, migliorare l'efficienza cardiovascolare e aumentare la capacità di bruciare grassi.                <br>ZONA 3: Zona Aerobica spinta e soglia aerobica   (75-83% di FCmax)                <br>Intensità moderata, spesso utilizzata per allenamenti a ritmo gara.<br>• Scopo: Aumentare la resistenza alla fatica</p>
<p>ZONA 4: Zona di soglia anaerobica a salire (83-93% di FCmax)                <br>Intensità alta, mix tra metabolismo aerobico e anaerobico<br>• Scopo: Migliorare la capacità anaerobica, la velocità e la potenza.            <br>ZONA 5: Zona di Massima Intensità (93-100% di FCmax)                <br>Massima intensità, utilizzabile solo per brevi periodi.<br>• Scopo: Migliorare la potenza massima e la velocità esplosiva.<br></p>
<p>❓CALCOLARE LA TUA ZONA               <br>Esempio Pratico per calcolare l'intervallo della tua zona 2. Cosa ti serve conoscere:                <br>Frequenza Cardiaca a Riposo (RHR): utilizza un orologio o una fascia cardio, prendi la misurazione lontano dai pasti e dopo esserti coricato per 5 minuti.                <br>Frequenza Cardiaca Massima (MHR): 220 - età               <br>                <br>Arriviamo ora alla formula:               <br>ZONA 2 (esempio) = [(MHR - RHR) × 0,65] + RHR.   0,65 corrisponde al 65%                <br>ZONA 2 (esempio) = [(MHR - RHR) × 0,75] + RHR.   0,75 corrisponde al 75%                <br>                <br>Ecco che i 2 risultati ci daranno l'intervallo di battiti corrispondente al 65-75% della FCmax. Questo range andrà rispettato per lavorare in zona 2.                <br>Per calcolare gli intervalli di zone differenti basterà sostituire il numero arancione al valore di intensità corrispondente.               </p>` },

// ── State ──────────────────────────────────────────────────────
let state = {
  token: localStorage.getItem("gtoken") || null,
  week: 1, session: "P1",
  exercises: [], inputs: {}, expanded: null,
  voto: null, votoInput: null, savingVoto: false,
  loading: false, saving: null, tab: "home", toast: null, expandedInfo: null,
};

function setState(patch) {
  state = { ...state, ...patch };
  render();
}

// ── OAuth ───────────────────────────────────────────────────────
function login() {
  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    redirect_uri: REDIRECT_URI,
    response_type: "token",
    scope: SCOPES,
    prompt: "select_account",
  });
  window.location.href = `https://accounts.google.com/o/oauth2/v2/auth?${params}`;
}

// On load: check for token in URL hash (redirect flow)
(function checkToken() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const token = params.get("access_token");
  if (token) {
    localStorage.setItem("gtoken", token);
    state.token = token;
    window.history.replaceState(null, "", window.location.pathname);
  }
})();

// ── Sheets helpers ──────────────────────────────────────────────
function colLetter(n) {
  let s = "";
  while (n >= 0) { s = String.fromCharCode(65 + (n % 26)) + s; n = Math.floor(n / 26) - 1; }
  return s;
}

function extractSession(rows, sessionCode, weekNum) {
  const exList = [];
  let inSection = false, weekColStart = -1;
  let votoRow = -1, votoCol = -1, noteCol = -1;
  const weekInBlock = weekNum <= 6 ? weekNum - 1 : weekNum - 7;
  for (let r = 0; r < rows.length; r++) {
    const row = rows[r];
    if (!row) continue;
    if (row[0] === sessionCode && !inSection) { inSection = true; continue; }
    if (!inSection) continue;
    if (row[0] === "ESERCIZIO") { weekColStart = 5 + weekInBlock * 8; continue; }
    if (row[0] && row[0] !== sessionCode && SESSIONS.includes(row[0])) break;
    // Look for the "Voto Allenamento" header to locate the rating/notes box
    if (weekColStart >= 0 && votoRow === -1) {
      for (let c = 0; c < row.length; c++) {
        if (row[c] && row[c].toString().startsWith("Voto Allenamento")) {
          votoRow = r + 1; // data is on the next row
          votoCol = c;
          noteCol = c + 1;
          break;
        }
      }
    }
    if (row[0] && row[0].toString().trim() !== "" && weekColStart >= 0) {
      const numSerie = parseInt(row[weekColStart]) || 3;
      exList.push({
        name: row[0], note: row[2] || "", rest: row[3] || "",
        numSerie: isNaN(numSerie) ? 3 : numSerie,
        rep: row[weekColStart + 1] || "", tecnica: row[weekColStart + 2] || "",
        existing: {
          carico: row[weekColStart + 3] || "",
          repFatte: row[weekColStart + 4] || "",
          feedback: row[weekColStart + 5] || "",
        },
        sheetRow: r,
        sheetColCarico: weekColStart + 3,
        sheetColRepFatte: weekColStart + 4,
        sheetColFeedback: weekColStart + 5,
      });
    }
  }
  let votoData = null;
  if (votoRow >= 0) {
    const vRow = rows[votoRow] || [];
    votoData = {
      sheetRow: votoRow,
      votoCol, noteCol,
      voto: vRow[votoCol] || "",
      note: vRow[noteCol] || "",
    };
  }
  return { exercises: exList, voto: votoData };
}

async function fetchSession() {
  if (!state.token) return;
  setState({ loading: true, exercises: [], inputs: {}, expanded: null });
  const sheetName = state.week <= 6 ? "PROG 1_6" : "PROG 7_13";
  try {
    const range = encodeURIComponent(`${sheetName}!A1:BZ300`);
    const res = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}`,
      { headers: { Authorization: `Bearer ${state.token}` } }
    );
    if (res.status === 401) { localStorage.removeItem("gtoken"); setState({ token: null, loading: false }); return; }
    const data = await res.json();
    const result = extractSession(data.values || [], state.session, state.week);
    const exercises = result.exercises;
    const inputs = {};
    exercises.forEach((ex, i) => {
      // New format uses " ; " as separator between sets (so commas/dashes are free for dropset notation like 20-15-10)
      // Old saved data may still use plain comma — fall back to that if no semicolon is found
      const splitSets = (str) => {
        const s = str.toString();
        return s.includes(";") ? s.split(";").map(x => x.trim()) : s.split(",").map(x => x.trim());
      };
      const cArr = splitSets(ex.existing.carico);
      const rArr = splitSets(ex.existing.repFatte);
      inputs[i] = {
        sets: Array.from({ length: ex.numSerie }, (_, s) => ({ load: cArr[s] || "", reps: rArr[s] || "" })),
        feedback: ex.existing.feedback || "",
      };
    });
    const votoInfo = result.voto;
    const votoInput = votoInfo ? { voto: votoInfo.voto || "", note: votoInfo.note || "" } : null;

    // Auto-expand the first exercise that isn't fully filled yet
    let autoExpand = null;
    for (let i = 0; i < exercises.length; i++) {
      const sets = inputs[i].sets;
      const isComplete = sets.length > 0 && sets.every(s => s.load && s.reps);
      if (!isComplete) { autoExpand = i; break; }
    }

    setState({ exercises, inputs, voto: votoInfo, votoInput, loading: false, expanded: autoExpand });
  } catch (e) {
    showToast("Errore caricamento", true);
    setState({ loading: false });
  }
}

async function saveExercise(exIdx) {
  const ex = state.exercises[exIdx];
  const inp = state.inputs[exIdx];
  if (!ex || !inp) return false;
  setState({ saving: exIdx });
  const sheetName = state.week <= 6 ? "PROG 1_6" : "PROG 7_13";
  try {
    const rowNum = ex.sheetRow + 1;
    const body = {
      valueInputOption: "RAW",
      data: [
        { range: `${sheetName}!${colLetter(ex.sheetColCarico)}${rowNum}`, values: [[inp.sets.map(s => s.load || "").join(" ; ")]] },
        { range: `${sheetName}!${colLetter(ex.sheetColRepFatte)}${rowNum}`, values: [[inp.sets.map(s => s.reps || "").join(" ; ")]] },
        { range: `${sheetName}!${colLetter(ex.sheetColFeedback)}${rowNum}`, values: [[inp.feedback || ""]] },
      ],
    };
    const res = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values:batchUpdate`,
      { method: "POST", headers: { Authorization: `Bearer ${state.token}`, "Content-Type": "application/json" }, body: JSON.stringify(body) }
    );
    if (!res.ok) { const err = await res.json(); throw new Error(err.error?.message); }
    showToast("✓ " + ex.name.split(" ")[0] + " salvato");
    return true;
  } catch(e) {
    showToast("Errore: " + e.message, true);
    return false;
  } finally {
    setState({ saving: null });
  }
}

async function saveAndNext(exIdx) {
  const ok = await saveExercise(exIdx);
  if (ok) {
    setState({ expanded: exIdx + 1 });
    setTimeout(() => {
      const el = document.getElementById(`ex-card-${exIdx + 1}`);
      if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
    }, 50);
  }
}

async function saveVoto() {
  const voto = state.voto;
  const inp = state.votoInput;
  if (!voto || !inp) return;
  setState({ savingVoto: true });
  const sheetName = state.week <= 6 ? "PROG 1_6" : "PROG 7_13";
  try {
    const rowNum = voto.sheetRow + 1;
    const body = {
      valueInputOption: "RAW",
      data: [
        { range: `${sheetName}!${colLetter(voto.votoCol)}${rowNum}`, values: [[inp.voto || ""]] },
        { range: `${sheetName}!${colLetter(voto.noteCol)}${rowNum}`, values: [[inp.note || ""]] },
      ],
    };
    const res = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values:batchUpdate`,
      { method: "POST", headers: { Authorization: `Bearer ${state.token}`, "Content-Type": "application/json" }, body: JSON.stringify(body) }
    );
    if (!res.ok) { const err = await res.json(); throw new Error(err.error?.message); }
    showToast("✓ Voto e note salvati");
  } catch(e) {
    showToast("Errore: " + e.message, true);
  } finally {
    setState({ savingVoto: false });
  }
}

function showToast(msg, isError = false) {
  setState({ toast: { msg, error: isError } });
  setTimeout(() => setState({ toast: null }), 2500);
}

function updateSet(exIdx, setIdx, field, val) {
  const inputs = { ...state.inputs };
  const sets = [...(inputs[exIdx]?.sets || [])];
  sets[setIdx] = { ...sets[setIdx], [field]: val };
  inputs[exIdx] = { ...inputs[exIdx], sets };
  state = { ...state, inputs }; // silent update, no re-render (keeps input focus)
}

function updateFeedback(exIdx, val) {
  const inputs = { ...state.inputs };
  inputs[exIdx] = { ...inputs[exIdx], feedback: val };
  state = { ...state, inputs }; // silent update, no re-render
}

function updateVoto(field, val) {
  const votoInput = { ...state.votoInput, [field]: val };
  state = { ...state, votoInput }; // silent update, no re-render
}

// ── Render ──────────────────────────────────────────────────────
function render() {
  const root = document.getElementById("root");
  if (!state.token) {
    root.innerHTML = renderLogin();
    return;
  }
  root.innerHTML = renderApp();
  // Attach event listeners after render
  attachEvents();
}

function renderLogin() {
  return `
    <div class="login-screen">
      <div class="login-logo">Logbook ↗</div>
      <div>
        <div class="login-title">Il tuo allenamento,<br><span>sempre con te.</span></div>
      </div>
      <p class="login-desc">Connetti il tuo account Google per sincronizzare la scheda con il tuo coach.</p>
      <button class="login-btn" onclick="login()">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303C33.654 32.657 29.332 36 24 36c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
          <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
          <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.316 0-9.828-3.222-11.552-7.799l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
          <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
        </svg>
        Accedi con Google
      </button>
      <div class="login-warn">💡 Dopo il login verrai riportato qui automaticamente.</div>
    </div>
  `;
}

function renderApp() {
  const { week, session, exercises, inputs, expanded, loading, saving, tab, toast, voto, votoInput, savingVoto, expandedInfo } = state;
  const sheetName = week <= 6 ? "PROG 1_6" : "PROG 7_13";

  const weekOptions = ALL_WEEKS.map(w =>
    `<option value="${w}" ${week === w ? "selected" : ""}>Settimana ${w}</option>`
  ).join("");

  const sessions = VISIBLE_SESSIONS.map(s =>
    `<button class="chip ${session === s ? "active" : ""}" onclick="selectSession('${s}')">${s}</button>`
  ).join("");

  let content = "";
  let headerSub = `${session} · Settimana ${week} · ${sheetName}`;
  let showSelectors = true;

  if (tab === "home") {
    showSelectors = false;
    headerSub = "Riferimenti e informazioni";
    content = renderHome(expandedInfo);
  } else {
    if (loading) {
      content = `<div class="loading"><div class="spinner"></div>Carico la scheda…</div>`;
    } else if (exercises.length === 0) {
      content = `<div class="empty">Nessun esercizio trovato per ${session} – Settimana ${week}.<br>Controlla che la scheda sia compilata dal coach.</div>`;
    } else {
      const doneCount = exercises.filter((ex, i) => {
        const sets = inputs[i]?.sets || [];
        return sets.length > 0 && sets.every(s => s.load && s.reps);
      }).length;
      content = renderProgressBar(doneCount, exercises.length);
      content += exercises.map((ex, i) => renderExCard(ex, i, inputs[i], expanded === i, saving === i, exercises.length)).join("");
      content += renderVotoBox(voto, votoInput, savingVoto);
    }
  }

  return `
    <div class="app">
      <div class="header">
        <div>
          <div class="header-title">Logbook</div>
          <div class="header-sub">${headerSub}</div>
        </div>
        <button class="logout-btn" onclick="logout()">Esci</button>
      </div>

      ${showSelectors ? `
        <div class="week-select-row">
          <select class="week-select" onchange="selectWeek(parseInt(this.value))">${weekOptions}</select>
        </div>
        <div class="selector-row">${sessions}</div>
      ` : ""}

      ${content}

      <div class="bottom-nav">
        <button class="nav-btn ${tab === "home" ? "active" : ""}" onclick="setTab('home')">
          <span class="nav-icon">🏠</span>Home
        </button>
        <button class="nav-btn ${tab === "workout" ? "active" : ""}" onclick="setTab('workout')">
          <span class="nav-icon">🏋️</span>Scheda
        </button>
      </div>

      ${toast ? `<div class="toast ${toast.error ? "error" : ""}">${toast.msg}</div>` : ""}
    </div>
  `;
}

function renderProgressBar(done, total) {
  const pct = total ? Math.round((done / total) * 100) : 0;
  return `
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">${done}/${total} esercizi completati</div>
    </div>`;
}

function renderExCard(ex, i, inp, isExpanded, isSaving, totalEx) {
  inp = inp || { sets: [], feedback: "" };
  const filledSets = (inp.sets || []).filter(s => s.load || s.reps).length;
  const allFilled = inp.sets && inp.sets.length > 0 && inp.sets.every(s => s.load && s.reps);
  const sets = isExpanded ? Array.from({ length: ex.numSerie }, (_, s) => {
    const sd = inp.sets?.[s] || { load: "", reps: "" };
    return `
      <div class="set-row">
        <div class="set-num">${s + 1}</div>
        <input type="text" inputmode="decimal" class="set-input ${sd.load ? "filled" : ""}"
          value="${sd.load}" placeholder="—"
          onchange="updateSet(${i}, ${s}, 'load', this.value)"
          oninput="updateSet(${i}, ${s}, 'load', this.value)">
        <input type="text" inputmode="decimal" class="set-input ${sd.reps ? "filled" : ""}"
          value="${sd.reps}" placeholder="${ex.rep ? ex.rep.toString().split('\\n')[0].split('_')[0] : '—'}"
          onchange="updateSet(${i}, ${s}, 'reps', this.value)"
          oninput="updateSet(${i}, ${s}, 'reps', this.value)">
      </div>`;
  }).join("") : "";

  const isLast = i === totalEx - 1;

  return `
    <div class="ex-card ${isExpanded ? "expanded" : ""} ${allFilled ? "completed" : ""}" id="ex-card-${i}">
      <div class="ex-header" onclick="toggleEx(${i})">
        <div class="ex-name">${allFilled ? "✓ " : ""}${ex.name}</div>
        <div class="ex-meta">
          <span class="badge accent">${ex.numSerie}×${ex.rep}</span>
          ${filledSets > 0 ? `<span class="badge ${allFilled ? "badge-done" : ""}">${filledSets}/${ex.numSerie}</span>` : ""}
          <span class="chevron ${isExpanded ? "open" : ""}">▾</span>
        </div>
      </div>
      ${isExpanded ? `
        <div class="ex-body">
          ${ex.tecnica ? `<div><div class="set-label">Tecnica</div><div class="tech-note">${ex.tecnica}</div></div>` : ""}
          ${ex.note ? `<div><div class="set-label">Note esercizio</div><div class="tech-note">${ex.note}</div></div>` : ""}
          <div>
            <div class="set-label">Serie · Rep target: <span style="color:var(--accent)">${ex.rep}</span></div>
            <div class="set-grid-header">
              <div></div>
              <div class="input-head">Carico (kg)</div>
              <div class="input-head">Rep fatte</div>
            </div>
            ${sets}
          </div>
          <div>
            <div class="set-label">Self feedback</div>
            <textarea class="feedback-area" placeholder="Come è andata? Note su tecnica, sensazioni…"
              oninput="updateFeedback(${i}, this.value)">${inp.feedback || ""}</textarea>
          </div>
          ${ex.rest ? `<div style="font-size:13px;color:var(--muted)">⏱ Recupero: <strong style="color:var(--text)">${ex.rest}</strong></div>` : ""}
          <div class="ex-actions">
            <button class="save-btn" onclick="saveExercise(${i})" ${isSaving ? "disabled" : ""}>
              ${isSaving ? "SALVO…" : "SALVA"}
            </button>
            ${!isLast ? `<button class="next-btn" onclick="saveAndNext(${i})" ${isSaving ? "disabled" : ""}>SALVA E VAI AL PROSSIMO →</button>` : ""}
          </div>
        </div>
      ` : ""}
    </div>`;
}

function renderHome(expandedInfo) {
  const accordions = INFO_SECTIONS.map(sec => `
    <div class="ex-card ${expandedInfo === sec.key ? "expanded" : ""}">
      <div class="ex-header" onclick="toggleInfo('${sec.key}')">
        <div class="ex-name">${sec.title}</div>
        <span class="chevron ${expandedInfo === sec.key ? "open" : ""}">▾</span>
      </div>
      ${expandedInfo === sec.key ? `<div class="ex-body info-body">${sec.html}</div>` : ""}
    </div>
  `).join("");

  return `
    <div class="vol-section">
      <div class="split-banner">
        <div class="split-banner-title">🎯 Test &amp; Split consigliata</div>
        <div class="split-banner-text">${TEST_SPLIT_INFO}</div>
      </div>
      <div class="vol-title" style="margin-top:8px">Materiale di riferimento</div>
    </div>
    ${accordions}
  `;
}

function renderVotoBox(voto, votoInput, savingVoto) {
  if (!voto || !votoInput) return "";
  return `
    <div class="ex-card voto-card">
      <div class="ex-body" style="border-top:none">
        <div class="set-label">Voto Allenamento e Note generali</div>
        <div class="voto-row">
          <div>
            <div class="input-head">Voto (1–5)</div>
            <input type="number" min="1" max="5" class="set-input ${votoInput.voto ? "filled" : ""}"
              value="${votoInput.voto}" placeholder="—"
              oninput="updateVoto('voto', this.value)">
          </div>
        </div>
        <div>
          <div class="input-head" style="text-align:left;margin-bottom:6px">Note generali</div>
          <textarea class="feedback-area" placeholder="Come è andata la seduta nel complesso?"
            oninput="updateVoto('note', this.value)">${votoInput.note || ""}</textarea>
        </div>
        <button class="save-btn" onclick="saveVoto()" ${savingVoto ? "disabled" : ""}>
          ${savingVoto ? "SALVO…" : "SALVA VOTO E NOTE ↗"}
        </button>
      </div>
    </div>`;
}

// ── Event handlers ──────────────────────────────────────────────
function toggleEx(i) {
  setState({ expanded: state.expanded === i ? null : i });
}
function toggleInfo(key) {
  setState({ expandedInfo: state.expandedInfo === key ? null : key });
}
function selectWeek(w) {
  setState({ week: w, exercises: [], inputs: {}, expanded: null });
  fetchSession();
}
function selectSession(s) {
  setState({ session: s, exercises: [], inputs: {}, expanded: null });
  fetchSession();
}
function setTab(t) { setState({ tab: t }); }
function logout() { localStorage.removeItem("gtoken"); setState({ token: null }); }
function attachEvents() {} // events are inline

// ── Init ────────────────────────────────────────────────────────
render();
if (state.token) fetchSession();
</script>
